name: opencastor_client
description: OpenCastor Fleet Management — control and monitor your robots from anywhere.
publish_to: 'none'
version: 1.5.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  firebase_messaging: ^16.1.3
  google_sign_in: ^7.0.0

  # UI
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flex_color_scheme: ^8.0.0
  flutter_animate: ^4.5.0

  # State
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  logger: ^2.4.0

  # Platform
  web: ^1.1.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  http: ^1.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.0
  web_socket_channel: ^3.0.1
  package_info_plus: ^9.0.1
  speech_to_text: ^7.3.0
  image_picker: ^1.1.0
  file_picker: ^10.3.10
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

# All launcher sources live under assets/images/ (PNG masters + SVG lockups for UI).
flutter_launcher_icons:
  android: true
  ios: true
  # Default + platform-specific paths (explicit so iOS/Android never drift).
  image_path: "assets/images/icon-1024.png"
  image_path_android: "assets/images/icon-1024.png"
  image_path_ios: "assets/images/icon-1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon-512.png"
  adaptive_icon_background: "#0e1416"
  adaptive_icon_foreground: "assets/images/icon-1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
