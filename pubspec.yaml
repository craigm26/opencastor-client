name: opencastor_client
description: OpenCastor Fleet Management — control and monitor your robots from anywhere.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  cloud_functions: ^4.7.0
  firebase_messaging: ^14.9.0
  google_sign_in: ^6.2.0

  # UI
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flex_color_scheme: ^8.0.0
  flutter_animate: ^4.5.0

  # State
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  logger: ^2.4.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  http: ^1.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  speech_to_text: ^6.6.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
