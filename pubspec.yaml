name: opencastor_client
description: OpenCastor Fleet Management — control and monitor your robots from anywhere.
publish_to: 'none'
version: 1.3.1+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.0

  # UI
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flex_color_scheme: ^8.0.0
  flutter_animate: ^4.5.0

  # State
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  logger: ^2.4.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  http: ^1.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  url_launcher: ^6.3.0
  web_socket_channel: ^3.0.1
  package_info_plus: ^8.0.0
  speech_to_text: ^6.6.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon-1024.png"
  adaptive_icon_background: "#0e1416"
  adaptive_icon_foreground: "assets/images/icon-1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
