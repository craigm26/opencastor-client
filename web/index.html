  <div id="loading">

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script>
    // When a new service worker is waiting (new app version deployed),
    // send SKIP_WAITING so it activates immediately without needing all
    // tabs closed. Then reload once to serve the new version.
    // Force SW update check on every page load — ensures stale SWs get replaced quickly.
    // Hard-reset escape hatch: ?nocache or ?reset in URL unregisters all SWs
    (function() {
      if (!window.location.search.includes('nocache') && !window.location.search.includes('reset')) return;
      if (!('serviceWorker' in navigator)) { window.location.replace(window.location.pathname); return; }
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        return Promise.all(regs.map(function(r) { return r.unregister(); }));
      }).then(function() {
        return caches.keys();
      }).then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      }).then(function() {
        window.location.replace(window.location.pathname);
      });
    })();
    if ('serviceWorker' in navigator) {
      // If a SW is already controlling, immediately trigger an update check.
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'CHECK_FOR_UPDATE' });
      }
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.update(); });
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
      navigator.serviceWorker.ready.then(function(reg) {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
    }
  </script>
