# analysis_options.yaml — configures Dart static analysis
# See: https://dart.dev/tools/analysis

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # These are pre-existing style warnings that don't affect functionality.
    # Downgraded to info so they don't block CI.
    unused_import: info
    unused_local_variable: info
    unused_element: info
    unnecessary_import: info
    deprecated_member_use: info

linter:
  rules:
    # Keep Flutter recommended lints from flutter_lints
