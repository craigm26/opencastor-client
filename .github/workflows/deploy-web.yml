name: Deploy — app.opencastor.com

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Flutter web build + Cloudflare Pages deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Write Firebase options
        # firebase_options.dart is gitignored.
        # Store the full file contents in GitHub secret: FIREBASE_OPTIONS_DART
        # If secret is not yet set, skip this step and use the placeholder file.
        if: ${{ secrets.FIREBASE_OPTIONS_DART != '' }}
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build Flutter web
        run: |
          flutter build web \
            --release \
            --base-href "/"

      - name: Deploy to Cloudflare Pages
        # Skip deploy if CF secrets are not configured yet
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=opencastor-client --branch=master
