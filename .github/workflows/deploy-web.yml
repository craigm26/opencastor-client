name: Deploy to app.opencastor.com

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Flutter web build and Cloudflare Pages deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Write Firebase options from secret
        # Store full file contents as GitHub secret: FIREBASE_OPTIONS_DART
        # If not yet set, placeholder file is used (build may warn but won't fail)
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
            echo "Firebase options written from secret."
          else
            echo "FIREBASE_OPTIONS_DART secret not set — using placeholder."
          fi

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build Flutter web
        run: flutter build web --release --base-href "/"

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=opencastor-client --branch=master
