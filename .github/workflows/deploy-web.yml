name: Deploy to app.opencastor.com

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Flutter web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Write Firebase credentials from secrets
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
            echo "firebase_options.dart written from secret."
          fi
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written from secret."
          fi
          # Inject Firebase config into service worker (replaces placeholders)
          if [ -n "$FIREBASE_API_KEY" ]; then
            sed -i "s|%%FIREBASE_API_KEY%%|$FIREBASE_API_KEY|g" web/firebase-messaging-sw.js
            sed -i "s|%%FIREBASE_APP_ID%%|$FIREBASE_APP_ID|g" web/firebase-messaging-sw.js
            echo "firebase-messaging-sw.js credentials injected."
          fi

      - name: Analyze
        run: flutter analyze --no-pub || true
        # Warnings are non-blocking; errors will still surface in build step

      - name: Build Flutter web
        # html renderer: ~1.5MB vs ~6MB CanvasKit — much faster initial load.
        # CanvasKit has better fidelity but unacceptable TTI for a PWA.
        run: flutter build web --release --base-href "/" --web-renderer html

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy when CF secrets are configured (set DEPLOY_ENABLED=true in repo vars)
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=opencastor-client --branch=master
