name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Flutter build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate firebase_options.dart (CI stub)
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          // CI stub — replace with: flutterfire configure --project=<your-project>
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'ci-stub', appId: '1:0:android:ci',
              messagingSenderId: '000000000000', projectId: 'ci-project',
              storageBucket: 'ci-project.appspot.com',
            );
            static const FirebaseOptions web = android;
            static const FirebaseOptions ios = android;
            static const FirebaseOptions macos = android;
          }
          EOF

      - name: Create google-services.json (CI stub)
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {"project_id": "ci-project", "project_number": "000000000000"},
            "client": [{
              "client_info": {"mobilesdk_app_id": "1:0:android:ci",
                "android_client_info": {"package_name": "com.craigm26.opencastor_client"}},
              "oauth_client": [], "api_key": [{"current_key": "ci-stub"}],
              "services": {"appinvite_service": {"other_platform_oauth_client": []}}
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test

      - name: Build web (debug check)
        run: flutter build web --release --base-href "/" --web-renderer html

      - name: Build APK (debug)
        run: flutter build apk --debug

  functions:
    name: Cloud Functions build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
      - run: npm run build
