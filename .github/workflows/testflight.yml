name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Build note (e.g. 'competition UI')"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      # ── Xcode 26 ─────────────────────────────────────────────────────────
      - name: Select Xcode 26
        run: |
          # Use Xcode 26 (iOS 26 SDK) to satisfy ITMS-90725
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null ||           sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          echo "SDKROOT=$(xcrun --show-sdk-path --sdk iphoneos)" >> $GITHUB_ENV

      # ── Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ── Generate iOS project files if missing ────────────────────────────
      - name: Generate iOS Xcode project
        run: |
          flutter create --project-name opencastor_client \
            --org com.craigm26 \
            --platforms ios \
            . || true
          ls ios/Runner.xcodeproj/project.pbxproj
          flutter pub get

      # ── Generate launcher icons ───────────────────────────────────────────
      - name: Generate launcher icons
        run: |
          # Apple rejects icons with alpha. JPEG round-trip strips alpha (JPEG has no alpha).
          sips -s format jpeg assets/images/icon-1024.png --out /tmp/icon-flat.jpg
          sips -s format png  /tmp/icon-flat.jpg --out assets/images/icon-1024.png
          # pubspec also sets remove_alpha_ios: true as belt-and-suspenders.
          dart run flutter_launcher_icons

      # ── Firebase credentials ─────────────────────────────────────────────
      - name: Write Firebase credentials
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          fi
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi
          # Write GoogleService-Info.plist — secret may be raw XML or base64-encoded
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
            # If not valid XML plist, try base64-decode
            if ! plutil -lint ios/Runner/GoogleService-Info.plist > /dev/null 2>&1; then
              echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
            fi
            # Normalize to XML1 so SWBUtil can parse it
            plutil -convert xml1 ios/Runner/GoogleService-Info.plist
          fi
          # Fallback: create a minimal valid stub so the build doesn't fail
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ] || \
             ! plutil -lint ios/Runner/GoogleService-Info.plist > /dev/null 2>&1; then
            echo "⚠️ GOOGLE_SERVICE_INFO_PLIST secret missing or invalid — using CI stub"
            cat > ios/Runner/GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>ci-stub</string>
            <key>BUNDLE_ID</key><string>com.craigm26.opencastorClient</string>
            <key>CLIENT_ID</key><string>ci-stub.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.ci-stub</string>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:ci-stub</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>PROJECT_ID</key><string>opencastor</string>
            <key>STORAGE_BUCKET</key><string>opencastor.firebasestorage.app</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
          </dict>
          </plist>
          PLIST
          fi
          echo "✅ GoogleService-Info.plist:"
          plutil -lint ios/Runner/GoogleService-Info.plist
        shell: bash

      # ── Set bundle ID and version ────────────────────────────────────────
      - name: Configure bundle ID and version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "VERSION=$VERSION BUILD=$BUILD"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier com.craigm26.opencastorClient" \
            ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/Runner/Info.plist

      # ── App Store Connect API key ────────────────────────────────────────
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # ── Import distribution certificate ─────────────────────────────────
      - name: Import distribution certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$DIST_CERT_P12" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain \
            -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "build" build.keychain
          rm /tmp/dist.p12
          echo "✅ Distribution certificate imported"

      # ── Install provisioning profile ─────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          # Extract UUID from profile
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          rm /tmp/profile.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "✅ Provisioning profile installed: $UUID"

      # ── Configure manual signing ─────────────────────────────────────────
      - name: Configure manual code signing
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          cd ios
          sed -i '' \
            "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = $APPLE_DEVELOPER_TEAM_ID;/g" \
            Runner.xcodeproj/project.pbxproj || true
          sed -i '' \
            "s/CODE_SIGN_STYLE = .*/CODE_SIGN_STYLE = Manual;/g" \
            Runner.xcodeproj/project.pbxproj || true

      # ── Install CocoaPods dependencies ───────────────────────────────────
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # ── Flutter build iOS ────────────────────────────────────────────────
      - name: Flutter build iOS (release)
        run: |
          flutter build ios --release --no-codesign

      # ── Xcode archive ────────────────────────────────────────────────────
      - name: Xcode archive
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          # No xcpretty — show raw output so errors are visible
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            DEVELOPMENT_TEAM="${APPLE_DEVELOPER_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="${PROFILE_UUID}" \
            2>&1 | tee /tmp/xcodebuild.log
          # Fail if archive wasn't created
          ls build/Runner.xcarchive || { echo "❌ Archive not found"; cat /tmp/xcodebuild.log | grep -E "error:|warning:" | tail -20; exit 1; }

      # ── Export IPA ───────────────────────────────────────────────────────
      - name: Export IPA
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_DEVELOPER_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.craigm26.opencastorClient</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ipa \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_API_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_API_KEY_ISSUER_ID}" \
            | xcpretty || true
          ls build/ipa/

      # ── Upload to TestFlight ─────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          IPA_PATH=$(find build/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found in build/ipa/"
            ls -la build/ipa/ || true
            exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight..."
          # altool deprecated in Xcode 26 — use xcrun altool via app-store-connect flag
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${ASC_API_KEY_ID}" \
            --apiIssuer "${ASC_API_KEY_ISSUER_ID}" \
            --verbose 2>&1 || \
          # Fallback: use xcode 26's recommended upload path
          xcrun xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

      - name: Summary
        run: |
          echo "✅ Build uploaded to TestFlight"
          echo "Check status at: https://appstoreconnect.apple.com/apps"
